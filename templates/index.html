<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יומן דיונים — בית דין רחובות</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f2f5; color: #222; }

  header {
    background: #1a3a6b;
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  header h1 { font-size: 1.3rem; flex: 1; }

  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .controls select, .controls input, .controls button {
    padding: 6px 10px;
    border-radius: 4px;
    border: none;
    font-size: 0.95rem;
  }
  .controls button {
    background: #f5a623;
    color: #fff;
    cursor: pointer;
    font-weight: bold;
  }
  .controls button:hover { background: #d4891a; }

  #status { padding: 8px 24px; font-size: 0.85rem; color: #555; min-height: 28px; }
  #status.error { color: #c0392b; }

  /* ── Calendar grid ── */
  .calendar-wrap { padding: 16px 24px; }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .month-nav button {
    background: #1a3a6b;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 1rem;
  }
  .month-nav button:hover { background: #2a5298; }
  #month-label { font-size: 1.1rem; font-weight: bold; }

  .calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .day-header {
    background: #1a3a6b;
    color: #fff;
    text-align: center;
    padding: 6px 0;
    font-size: 0.8rem;
    border-radius: 4px;
  }
  .day-cell {
    background: #fff;
    border-radius: 6px;
    min-height: 110px;
    padding: 6px;
    position: relative;
    border: 1px solid #dde;
    overflow: hidden;
  }
  .day-cell.empty { background: transparent; border: none; }
  .day-cell.today { border-color: #f5a623; box-shadow: 0 0 0 2px #f5a623; }
  .day-num {
    font-size: 0.75rem;
    font-weight: bold;
    color: #888;
    margin-bottom: 4px;
  }

  /* Hearing chips */
  .hearing-chip {
    background: #e8f0fe;
    border-right: 3px solid #1a73e8;
    border-radius: 3px;
    padding: 2px 4px;
    margin-bottom: 3px;
    font-size: 0.72rem;
    cursor: pointer;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hearing-chip:hover { background: #c8dcfd; }
  .hearing-chip.assembly-ב { border-color: #34a853; background: #e6f4ea; }
  .hearing-chip.assembly-ג { border-color: #ea4335; background: #fce8e6; }

  /* Tooltip / detail panel */
  #detail {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    padding: 20px 24px;
    z-index: 100;
    min-width: 320px;
    max-width: 480px;
    direction: rtl;
  }
  #detail h3 { margin-bottom: 12px; color: #1a3a6b; }
  #detail table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  #detail td { padding: 4px 8px; }
  #detail td:first-child { font-weight: bold; color: #555; white-space: nowrap; }
  #detail .close-btn {
    position: absolute;
    top: 10px;
    left: 14px;
    background: none;
    border: none;
    font-size: 1.2rem;
    cursor: pointer;
    color: #888;
  }
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 99;
  }

  /* Assembly legend */
  .legend {
    display: flex;
    gap: 16px;
    padding: 0 24px 12px;
    font-size: 0.82rem;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 2px;
    border-right: 3px solid;
  }
  .legend-dot.a { background: #e8f0fe; border-color: #1a73e8; }
  .legend-dot.b { background: #e6f4ea; border-color: #34a853; }
  .legend-dot.c { background: #fce8e6; border-color: #ea4335; }
</style>
</head>
<body>

<header>
  <h1>יומן דיונים — בית דין אזורי רחובות</h1>
  <div class="controls">
    <label>משתמש:
      <input id="userId" type="text" value="1" style="width:60px">
    </label>
    <button onclick="loadHearings()">רענן</button>
  </div>
</header>

<div id="status"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot a"></div> הרכב א</div>
  <div class="legend-item"><div class="legend-dot b"></div> הרכב ב</div>
  <div class="legend-item"><div class="legend-dot c"></div> הרכב ג</div>
</div>

<div class="calendar-wrap">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8250;</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">&#8249;</button>
  </div>
  <div class="calendar" id="calendar"></div>
</div>

<div id="overlay" onclick="closeDetail()"></div>
<div id="detail">
  <button class="close-btn" onclick="closeDetail()">✕</button>
  <h3 id="detail-title"></h3>
  <table id="detail-table"></table>
</div>

<script>
  const HE_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני",
                     "יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
  const DAY_NAMES = ["א׳","ב׳","ג׳","ד׳","ה׳","ו׳","ש׳"]; // Sun-Sat

  let currentYear, currentMonth;
  let allHearings = []; // [{date:"DD/MM/YYYY", ...}, ...]

  function init() {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth() + 1;
    loadHearings();
  }

  function changeMonth(delta) {
    currentMonth += delta;
    if (currentMonth > 12) { currentMonth = 1; currentYear++; }
    if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
    loadHearings();
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = isError ? "error" : "";
  }

  async function loadHearings() {
    const userId = document.getElementById("userId").value.trim() || "1";
    setStatus("טוען נתונים...");
    updateLabel();
    try {
      const res = await fetch(`/api/hearings?user_id=${encodeURIComponent(userId)}&year=${currentYear}&month=${currentMonth}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || res.statusText);
      allHearings = data;
      setStatus(`נטענו ${data.length} דיונים`);
      renderCalendar();
    } catch(e) {
      setStatus("שגיאה: " + e.message, true);
      allHearings = [];
      renderCalendar();
    }
  }

  function updateLabel() {
    document.getElementById("month-label").textContent =
      `${HE_MONTHS[currentMonth-1]} ${currentYear}`;
  }

  function hearingsForDate(dateStr) {
    return allHearings.filter(h => h.date === dateStr);
  }

  function padZ(n) { return String(n).padStart(2, "0"); }

  function renderCalendar() {
    const cal = document.getElementById("calendar");
    cal.innerHTML = "";

    // Day headers: Sun=0 ... Sat=6
    DAY_NAMES.forEach(d => {
      const h = document.createElement("div");
      h.className = "day-header";
      h.textContent = d;
      cal.appendChild(h);
    });

    const firstDay = new Date(currentYear, currentMonth - 1, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
    const today = new Date();
    const todayStr = `${padZ(today.getDate())}/${padZ(today.getMonth()+1)}/${today.getFullYear()}`;

    // Empty cells before day 1
    for (let i = 0; i < firstDay; i++) {
      const empty = document.createElement("div");
      empty.className = "day-cell empty";
      cal.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${padZ(day)}/${padZ(currentMonth)}/${currentYear}`;
      const cell = document.createElement("div");
      cell.className = "day-cell" + (dateStr === todayStr ? " today" : "");

      const num = document.createElement("div");
      num.className = "day-num";
      num.textContent = day;
      cell.appendChild(num);

      hearingsForDate(dateStr).forEach(h => {
        const chip = document.createElement("div");
        const assembly = (h.assembly || "").replace("הרכב","").trim();
        chip.className = `hearing-chip assembly-${assembly}`;
        chip.title = `${h.case_number} | ${h.parties}`;
        chip.textContent = `${h.time} ${h.case_number}`;
        chip.onclick = () => showDetail(h);
        cell.appendChild(chip);
      });

      cal.appendChild(cell);
    }
  }

  function showDetail(h) {
    document.getElementById("detail-title").textContent = h.case_number || "דיון";
    const rows = [
      ["תאריך", h.date],
      ["שעה", h.time],
      ["תיק", h.case_number],
      ["צדדים", h.parties],
      ["הרכב", h.assembly],
      ["שופט", h.judge],
      ["חדר", h.room],
    ];
    document.getElementById("detail-table").innerHTML = rows
      .filter(([,v]) => v)
      .map(([k,v]) => `<tr><td>${k}</td><td>${v}</td></tr>`)
      .join("");
    document.getElementById("overlay").style.display = "block";
    document.getElementById("detail").style.display = "block";
  }

  function closeDetail() {
    document.getElementById("overlay").style.display = "none";
    document.getElementById("detail").style.display = "none";
  }

  init();
</script>
</body>
</html>
